services:
  - type: web
    name: balansi-backend
    env: python
    rootDir: BackEnd
    buildCommand: ./build.sh
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: balansi-db
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false # Set this in Render dashboard
      - key: PORT
        value: 10000

databases:
  - name: balansi-db
    plan: free # Note: Render free DB expires in 90 days
